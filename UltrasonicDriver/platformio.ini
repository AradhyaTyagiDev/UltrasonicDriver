; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = esp32-idf-rmt

[common]
build_unflags = -std=gnu++11
build_flags =
  -std=gnu++17
  -Os
  -ffunction-sections
  -fdata-sections
  -Wl,--gc-sections

; ================= ESP-IDF RMT =================
[env:esp32-idf-rmt]
platform = espressif32
framework = espidf
board = esp32dev

build_unflags = ${common.build_unflags}
build_flags =
  ${common.build_flags}
  -DULTRASONIC_DRIVER_ESP_IDF_RMT

build_src_filter =
  +<*>
  -<mock/*>
  -<drivers/*>
  +<drivers/esp_idf_rmt/*>

; ================= ARDUINO ISR =================
[env:esp32-arduino-isr]
platform = espressif32
framework = arduino
board = esp32dev

build_unflags = ${common.build_unflags}
build_flags =
  ${common.build_flags}
  -DULTRASONIC_DRIVER_ESP32_ARDUINO_ISR

build_src_filter =
  +<*>
  -<mock/*>
  -<drivers/*>
  +<drivers/esp32_arduino_isr/*>

; ================= MOCK =================
[env:mock]
platform = espressif32
framework = espidf
board = esp32dev

build_unflags = ${common.build_unflags}
build_flags =
  -std=gnu++17
  -O0
  -DULTRASONIC_DRIVER_ESP_IDF_RMT

build_src_filter =
  +<*>
  +<mock/*>
  -<drivers/*>